<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Report — Kootenay Lawn Doctor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f0e8; color: #1a1a1a; font-size: 14px; }
  .page { max-width: 860px; margin: 0 auto; padding: 24px 20px 48px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .report-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #d6cfc0; width: fit-content; }
  .report-tab { padding: 8px 20px; border: none; background: #ede8df; color: #666; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .report-tab:not(:last-child) { border-right: 1px solid #d6cfc0; }
  .report-tab.active-prepay   { background: #c1440e; color: #fff; }
  .report-tab.active-direct   { background: #2563eb; color: #fff; }
  .report-tab.active-combined { background: #6b21a8; color: #fff; }
  .report-tab.active-gst      { background: #0f7955; color: #fff; }
  .report-tab:not([class*="active"]):hover { background: #ddd6c8; }
  .period-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .period-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
  .period-group { display: flex; gap: 0; border-radius: 20px; overflow: hidden; border: 1px solid #d6cfc0; }
  .period-btn { padding: 5px 13px; border: none; background: #ede8df; color: #555; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .period-btn:not(:last-child) { border-right: 1px solid #d6cfc0; }
  .period-btn:hover:not(.active):not(:disabled) { background: #ddd6c8; }
  .period-btn.active { background: #1a1a1a; color: #fff; }
  .period-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .tab { padding: 5px 13px; border-radius: 20px; border: none; background: #e8e2d6; color: #555; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .tab:hover { background: #ddd6c8; }
  .tab.active-prepay   { background: #c1440e; color: #fff; }
  .tab.active-direct   { background: #2563eb; color: #fff; }
  .tab.active-combined { background: #6b21a8; color: #fff; }
  .tab.active-gst      { background: #0f7955; color: #fff; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e2d6; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #888; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; color: #1a1a1a; line-height: 1.1; }
  .stat-sub { font-size: 11px; color: #999; margin-top: 3px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .chart-card { background: #fff; border-radius: 10px; padding: 18px; border: 1px solid #e8e2d6; }
  .chart-full { grid-column: 1 / -1; }
  .chart-title { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #888; text-transform: uppercase; margin-bottom: 14px; }
  .trend-card { background: #fff; border-radius: 10px; padding: 18px; border: 1px solid #e8e2d6; margin-bottom: 12px; }
  .trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .stack-legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .stack-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; font-weight: 600; }
  .stack-legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .pay-method-card { background: #fff; border-radius: 10px; padding: 18px; border: 1px solid #e8e2d6; margin-bottom: 12px; }
  .table-card { background: #fff; border-radius: 10px; padding: 18px; border: 1px solid #e8e2d6; }
  .table-title { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #888; text-transform: uppercase; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; color: #999; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid #f0ebe0; }
  th:not(:first-child) { text-align: right; }
  td { padding: 8px 0; border-bottom: 1px solid #f5f0e8; font-size: 13px; }
  td:not(:first-child) { text-align: right; }
  td.svc-name { color: #1a1a1a; font-weight: 500; max-width: 240px; }
  td.svc-bar { width: 80px; padding-left: 12px; }
  .mini-bar-bg { height: 5px; background: #f0ebe0; border-radius: 3px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 3px; }
  tfoot td { padding: 9px 0; font-weight: 700; font-size: 13px; border-top: 2px solid #e8e2d6; border-bottom: none; }
  tfoot td:not(:first-child) { text-align: right; }
  .combined-prepay { color: #c1440e !important; font-weight: 600; }
  .combined-direct { color: #2563eb !important; font-weight: 600; }
  .combined-total  { color: #6b21a8 !important; font-weight: 700; }
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .stat-value { font-size: 16px; }
    .charts-row .chart-full { grid-column: 1; }
    .trend-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

<div class="page">
  <h1>Payment Report — Kootenay Lawn Doctor</h1>
  <div class="report-tabs">
    <button class="report-tab active-prepay" onclick="setReport('prepay')">Prepayments</button>
    <button class="report-tab" onclick="setReport('direct')">Direct Payments</button>
    <button class="report-tab" onclick="setReport('combined')">Combined</button>
    <button class="report-tab" onclick="setReport('gst')">GST</button>
  </div>

    <span class="period-label">View by</span>

      <button class="period-btn"        id="btn-quarterly" onclick="setPeriod('quarterly')">Quarterly</button>
      <button class="period-btn"        id="btn-fiscal"    onclick="setPeriod('fiscal')">Fiscal</button>
    </div>
  </div>
  <div class="tabs" id="tab-container"></div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label" id="lbl-a">&mdash;</div><div class="stat-value" id="s-a">&mdash;</div><div class="stat-sub" id="s-a2">&mdash;</div></div>
    <div class="stat-card" id="card-b"><div class="stat-label" id="lbl-b">&mdash;</div><div class="stat-value" id="s-b">&mdash;</div><div class="stat-sub" id="s-b2">&mdash;</div></div>

  </div>
  <div class="charts-row" id="charts-row">

    <div class="chart-card chart-full" id="stack-card" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div class="chart-title" style="margin:0">REVENUE BY SERVICE — COMBINED</div><div class="stack-legend"><div class="stack-legend-item"><div class="stack-legend-dot" style="background:#c1440e"></div>Prepay Applied</div><div class="stack-legend-item"><div class="stack-legend-dot" style="background:#2563eb"></div>Direct Billed</div></div></div><canvas id="stackChart" height="260"></canvas></div>
  </div>
  <div class="trend-card"><div class="trend-header"><div class="chart-title" style="margin:0" id="trend-title">PERIOD REVENUE TREND</div><div class="stack-legend" id="trend-legend"></div></div><canvas id="trendChart" height="110"></canvas></div>
  <div class="pay-method-card" id="pay-method-card" style="display:none"><div class="table-title">Prepayments Collected by Payment Method</div><table><thead><tr><th>Method</th><th>Payments</th><th>Amount</th><th>% of Total</th><th></th></tr></thead><tbody id="pay-method-tbody"></tbody><tfoot id="pay-method-tfoot"></tfoot></table></div>
  <div class="table-card"><div class="table-title" id="tbl-title">Service Breakdown — Alphabetical</div><table><thead id="tbl-head"></thead><tbody id="svc-tbody"></tbody></table></div>
</div>

    result[p.key]={prepayment_count:pC,prepayment_total:round2(pT),still_unused:round2(cumC-pA),by_method:bM};
  }
  let aT=0,aC=0;const aM={};
  for(const r of cR){aT+=r.a;aC++;if(!aM[r.m])aM[r.m]={amount:0,count:0};aM[r.m].amount+=r.a;aM[r.m].count++;}
  let tA=0;for(const r of aR)tA+=r.r;
  result[allKey]={prepayment_count:aC,prepayment_total:round2(aT),still_unused:round2(aT-tA),by_method:aM};
  return result;
}
function aggregateQuarters(records,allKey){
  const result={};
  for(const [qK,mK] of Object.entries(QUARTERS)){
    const mPs=CALENDAR_MONTHS.filter(m=>mK.includes(m.key));
    let total=0,count=0;const svcs={};
    for(const p of mPs){for(const r of records){if(r.d>=p.start&&r.d<=p.end){total+=r.r;count++;if(!svcs[r.s])svcs[r.s]={revenue:0,count:0};svcs[r.s].revenue+=r.r;svcs[r.s].count++;}}}
    result[qK]={total:round2(total),invoice_count:count,services:svcs};
  }
  let aT=0,aC=0;const aS={};
  for(const r of records){aT+=r.r;aC++;if(!aS[r.s])aS[r.s]={revenue:0,count:0};aS[r.s].revenue+=r.r;aS[r.s].count++;}
  result[allKey]={total:round2(aT),invoice_count:aC,services:aS};
  return result;
}
function aggregateCollectedQuarters(cR,aR,allKey){
  const result={};
  for(const [qK,mK] of Object.entries(QUARTERS)){
    const mPs=CALENDAR_MONTHS.filter(m=>mK.includes(m.key));
    const qS=mPs[0].start,qE=mPs[mPs.length-1].end;
    let pT=0,pC=0;const bM={};
    for(const r of cR){if(r.d>=qS&&r.d<=qE){pT+=r.a;pC++;if(!bM[r.m])bM[r.m]={amount:0,count:0};bM[r.m].amount+=r.a;bM[r.m].count++;}}
    let cC=0,cA=0;for(const r of cR){if(r.d<=qE)cC+=r.a;}for(const r of aR){if(r.d<=qE)cA+=r.r;}
    result[qK]={prepayment_count:pC,prepayment_total:round2(pT),still_unused:round2(cC-cA),by_method:bM};
  }
  let aT=0,aC=0;const aM={};
  for(const r of cR){aT+=r.a;aC++;if(!aM[r.m])aM[r.m]={amount:0,count:0};aM[r.m].amount+=r.a;aM[r.m].count++;}
  let tA=0;for(const r of aR)tA+=r.r;
  result[allKey]={prepayment_count:aC,prepayment_total:round2(aT),still_unused:round2(aT-tA),by_method:aM};
  return result;
}

let currentReport='prepay',currentPeriod='monthly',currentTab='All Months';
function getPeriodKeys(){if(currentPeriod==='monthly')return CALENDAR_MONTHS.map(p=>p.key);if(currentPeriod==='fiscal')return FISCAL_PERIODS.map(p=>p.key);if(currentPeriod==='quarterly')return QUARTER_KEYS;return[];}
function getAllKey(){if(currentPeriod==='monthly')return'All Months';if(currentPeriod==='quarterly')return'All';if(currentPeriod==='fiscal')return'All Fiscal';return'All';}
function getAggregated(){
  const aK=getAllKey();let applied,direct,collected;
  if(currentPeriod==='monthly'){applied=aggregateRevenue(RECORDS.applied,CALENDAR_MONTHS,aK);direct=aggregateRevenue(RECORDS.direct,CALENDAR_MONTHS,aK);collected=aggregateCollected(RECORDS.collected,RECORDS.applied,CALENDAR_MONTHS,aK);}
  else if(currentPeriod==='fiscal'){applied=aggregateRevenue(RECORDS.applied,FISCAL_PERIODS,aK);direct=aggregateRevenue(RECORDS.direct,FISCAL_PERIODS,aK);collected=aggregateCollected(RECORDS.collected,RECORDS.applied,FISCAL_PERIODS,aK);}
  else{applied=aggregateQuarters(RECORDS.applied,aK);direct=aggregateQuarters(RECORDS.direct,aK);collected=aggregateCollectedQuarters(RECORDS.collected,RECORDS.applied,aK);}
  return{applied,direct,collected,allKey:aK};
}

  const maxGST=rows.reduce((m,r)=>Math.max(m,r.totalGST),1);
  const tPG=rows.reduce((s,r)=>s+r.prepayGST,0),tDG=rows.reduce((s,r)=>s+r.directGST,0),tG=tPG+tDG,tGr=rows.reduce((s,r)=>s+r.gross,0);
  document.getElementById('svc-tbody').innerHTML=rows.map(r=>`<tr><td class="svc-name">${r.name}</td><td style="color:#c1440e;font-weight:600">${r.prepayGST>0?fmt(r.prepayGST):'—'}</td><td style="color:#2563eb;font-weight:600">${r.directGST>0?fmt(r.directGST):'—'}</td><td style="color:#0f7955;font-weight:700">${fmt(r.totalGST)}</td><td style="color:#888">${fmt(r.gross)}</td><td style="color:#555;font-weight:600">${fmt(r.gross-r.totalGST)}</td><td class="svc-bar"><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(r.totalGST/maxGST*100)}%;background:#0f7955"></div></div></td></tr>`).join('')+`<tr style="border-top:2px solid #e8e2d6;font-weight:700"><td class="svc-name">Total</td><td style="color:#c1440e;font-weight:700">${fmt(tPG)}</td><td style="color:#2563eb;font-weight:700">${fmt(tDG)}</td><td style="color:#0f7955;font-weight:700">${fmt(tG)}</td><td style="color:#888;font-weight:700">${fmt(tGr)}</td><td style="color:#555;font-weight:700">${fmt(tGr-tG)}</td><td></td></tr>`;
}
// ── Navigation ────────────────────────────────────────────────────────────────
function buildTabs(){
  const cls=`active-${currentReport}`;let tabs;
  if(currentReport==='gst'||currentPeriod==='monthly')tabs=['All Months',...CALENDAR_MONTHS.map(p=>p.key)];
  else if(currentPeriod==='quarterly')tabs=['All',...QUARTER_KEYS];
  else tabs=['All Fiscal',...FISCAL_PERIODS.map(p=>p.key)];
  document.getElementById('tab-container').innerHTML=tabs.map(t=>`<button class="tab ${t===currentTab?cls:''}" onclick="selectTab('${t}')">${t}</button>`).join('');
}
function selectTab(t){currentTab=t;buildTabs();if(currentReport==='gst')renderGST();else render();}
function setPeriod(p){
  if(currentReport==='gst'&&p==='fiscal')return;
  currentPeriod=p;
  if(p==='monthly')currentTab='All Months';else if(p==='quarterly')currentTab='All';else if(p==='fiscal')currentTab='All Fiscal';
  document.getElementById('btn-monthly').classList.toggle('active',p==='monthly');
  document.getElementById('btn-quarterly').classList.toggle('active',p==='quarterly');
  document.getElementById('btn-fiscal').classList.toggle('active',p==='fiscal');
  updateFiscalBtn();buildTabs();if(currentReport==='gst')renderGST();else render();
}
function setReport(r){
  currentReport=r;
  if(r==='gst'&&currentPeriod==='fiscal'){currentPeriod='monthly';currentTab='All Months';document.getElementById('btn-monthly').classList.add('active');document.getElementById('btn-fiscal').classList.remove('active');}
  updateFiscalBtn();
  document.querySelectorAll('.report-tab').forEach((btn,i)=>{btn.className='report-tab';if((i===0&&r==='prepay')||(i===1&&r==='direct')||(i===2&&r==='combined')||(i===3&&r==='gst'))btn.classList.add('active-'+r);});
  buildTabs();if(r==='gst')renderGST();else render();
}
function updateFiscalBtn(){const btn=document.getElementById('btn-fiscal');if(currentReport==='gst'){btn.disabled=true;btn.title='Fiscal periods not available for GST view';}else{btn.disabled=false;btn.title='';}}
// ── Init ────────────────────────────────────────────────────────────────────
updateFiscalBtn();buildTabs();render();
</script>
</body>
